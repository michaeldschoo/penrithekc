<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sending Essay - Penrithekc</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: oklch(0.98 0.01 250); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .send-container { max-width: 500px; width: 90%; background: white; padding: 3rem; border-radius: 16px; box-shadow: 0 10px 40px oklch(0 0 0 / 0.1); text-align: center; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid oklch(0.9 0.02 250); border-top: 5px solid oklch(0.6 0.2 250); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: oklch(0.4 0.05 250); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="send-container" id="status-loading">
        <div class="loading-spinner"></div>
        <h2>Sending your essay...</h2>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxDGUmSRLynQJBepZOL7XwuE2RUKbveg2jI9_EXgBzSJXBjVOExY_475blS4XNWt1A/exec';

        async function sendDirectly() {
            const savedData = JSON.parse(localStorage.getItem('penrithekc_writing_data'));
            if (!savedData) { window.location.href = 'index.html'; return; }

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = GAS_URL;
            form.style.display = 'none';

            const fields = {
                firstName: savedData.firstName,
                lastName: savedData.lastName,
                testNumber: savedData.testNumber,
                content: savedData.content // 이제 파일을 안 보내고 본문을 직접 전송
            };

            for (const key in fields) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = fields[key];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit();
            localStorage.removeItem('penrithekc_writing_data');
        }
        sendDirectly();
    </script>
</body>
</html>
