<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sending Essay as Word - Penrithekc</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: oklch(0.98 0.01 250); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .send-container { max-width: 500px; width: 90%; background: white; padding: 3rem; border-radius: 16px; box-shadow: 0 10px 40px oklch(0 0 0 / 0.1); text-align: center; }
        .status-icon { font-size: 4rem; margin-bottom: 1.5rem; display: inline-block; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid oklch(0.9 0.02 250); border-top: 5px solid oklch(0.6 0.2 250); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: oklch(0.4 0.05 250); margin-bottom: 1rem; }
        p { color: oklch(0.5 0.02 250); line-height: 1.6; }
        .btn-back { margin-top: 2rem; display: inline-block; padding: 0.8rem 2rem; background: oklch(0.6 0.2 250); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; transition: all 0.2s; }
        .btn-back:hover { transform: translateY(-2px); opacity: 0.9; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="send-container">
        <div id="status-loading">
            <div class="loading-spinner"></div>
            <h2>Preparing your Word document...</h2>
        </div>
        <div id="status-success" class="hidden">
            <div class="status-icon">✅</div>
            <h2>Submission Successful!</h2>
            <a href="index.html" class="btn-back">Back to Writing</a>
        </div>
        <div id="status-error" class="hidden">
            <div class="status-icon">❌</div>
            <h2>Submission Failed</h2>
            <p id="error-message"></p>
            <a href="index.html" class="btn-back">Try Again</a>
        </div>
    </div>

    <script type="module">
        import * as docxModule from 'https://cdn.jsdelivr.net/npm/docx@8.2.2/+esm';
        // v8+ ESM 번들은 default 내보내기를 사용할 수 있음. 
        // 직접 속성으로 접근하거나 default에서 접근.
        const docx = docxModule.default || docxModule;
        console.log('docx library loaded:', docx);

        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxDGUmSRLynQJBepZOL7XwuE2RUKbveg2jI9_EXgBzSJXBjVOExY_475blS4XNWt1A/exec';

        async function generateAndSend() {
            const savedData = JSON.parse(localStorage.getItem('penrithekc_writing_data'));
            
            try {
                const paragraphs = savedData.content.split('\n').map(line => {
                    return new docx.Paragraph({
                        children: [new docx.TextRun({ text: line })],
                        spacing: { line: 480 },
                    });
                });

                const doc = new docx.Document({
                    sections: [{
                        children: [
                            new docx.Paragraph({
                                children: [new docx.TextRun({ text: "Writing Practice Submission", bold: true, size: 32 })],
                                alignment: docx.AlignmentType.CENTER,
                            }),
                            new docx.Paragraph({ children: [new docx.TextRun({ text: `Student: ${savedData.firstName} ${savedData.lastName}`, bold: true })] }),
                            ...paragraphs
                        ],
                    }],
                });

                const blob = await docx.Packer.toBlob(doc);
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            firstName: savedData.firstName,
                            lastName: savedData.lastName,
                            testNumber: savedData.testNumber,
                            fileBase64: base64
                        })
                    });
                    const result = await response.json();
                    if (result.result === 'success') {
                        document.getElementById('status-loading').classList.add('hidden');
                        document.getElementById('status-success').classList.remove('hidden');
                        localStorage.removeItem('penrithekc_writing_data');
                    } else {
                        showError('Server Error: ' + (result.error || 'Failed'));
                    }
                };
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        function showError(msg) {
            document.getElementById('status-loading').classList.add('hidden');
            document.getElementById('status-error').classList.remove('hidden');
            document.getElementById('error-message').innerText = msg;
        }

        generateAndSend();
    </script>
</body>
</html>
