<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sending Essay as Word - Penrithekc</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/docx@8.2.2/build/index.js"></script>
    <style>
        body {
            background: oklch(0.98 0.01 250);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .send-container {
            max-width: 500px;
            width: 90%;
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px oklch(0 0 0 / 0.1);
            text-align: center;
        }
        .status-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid oklch(0.9 0.02 250);
            border-top: 5px solid oklch(0.6 0.2 250);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: oklch(0.4 0.05 250); margin-bottom: 1rem; }
        p { color: oklch(0.5 0.02 250); line-height: 1.6; }
        .btn-back {
            margin-top: 2rem;
            display: inline-block;
            padding: 0.8rem 2rem;
            background: oklch(0.6 0.2 250);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-back:hover { transform: translateY(-2px); opacity: 0.9; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="send-container">
        <div id="status-loading">
            <div class="loading-spinner"></div>
            <h2>Preparing your Word document...</h2>
            <p>We are formatting your essay and preparing it for submission.</p>
        </div>

        <div id="status-success" class="hidden">
            <div class="status-icon">✅</div>
            <h2>Submission Successful!</h2>
            <p>Your essay has been sent as a Word attachment to <strong>penrithekc@gmail.com</strong>.</p>
            <a href="index.html" class="btn-back">Back to Writing</a>
        </div>

        <div id="status-error" class="hidden">
            <div class="status-icon">❌</div>
            <h2>Submission Failed</h2>
            <p id="error-message">Something went wrong while sending your work.</p>
            <a href="index.html" class="btn-back">Try Again</a>
        </div>
    </div>

    <script>
        // --- GAS Web App URL ---
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxDGUmSRLynQJBepZOL7XwuE2RUKbveg2jI9_EXgBzSJXBjVOExY_475blS4XNWt1A/exec';

        async function generateAndSend() {
            const storageKey = 'penrithekc_writing_data';
            const savedData = localStorage.getItem(storageKey);

            if (!savedData) {
                showError('No essay data found. Please write something first.');
                return;
            }

            try {
                const data = JSON.parse(savedData);
                if (!data.content) {
                    showError('Essay content is empty.');
                    return;
                }

                // 1. Generate Word Document using docx.js
                const doc = new docx.Document({
                    sections: [{
                        properties: {},
                        children: [
                            new docx.Paragraph({
                                children: [
                                    new docx.TextRun({ text: "Writing Practice Submission", bold: true, size: 32 }),
                                ],
                                spacing: { after: 400 },
                                alignment: docx.AlignmentType.CENTER,
                            }),
                            new docx.Paragraph({
                                children: [
                                    new docx.TextRun({ text: `Student Name: ${data.firstName} ${data.lastName}`, bold: true }),
                                ],
                            }),
                            new docx.Paragraph({
                                children: [
                                    new docx.TextRun({ text: `Test Number: #${data.testNumber}`, bold: true }),
                                ],
                            }),
                            new docx.Paragraph({
                                children: [
                                    new docx.TextRun({ text: `Date: ${new Date().toLocaleDateString()}`, bold: true }),
                                ],
                                spacing: { after: 600 },
                            }),
                            new docx.Paragraph({
                                children: [
                                    new docx.TextRun({ text: data.content }),
                                ],
                                spacing: { line: 480 }, // Double spacing equivalent
                            }),
                        ],
                    }],
                });

                const blob = await docx.Packer.toBlob(doc);

                // 2. Convert Blob to Base64
                const base64 = await blobToBase64(blob);

                // 3. Send to GAS
                document.getElementById('status-loading').querySelector('h2').innerText = 'Sending to Teacher...';
                
                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            firstName: data.firstName,
                            lastName: data.lastName,
                            testNumber: data.testNumber,
                            fileBase64: base64.split(',')[1] // Remove metadata prefix
                        })
                    });

                    // GAS can redirect (302), fetch handles this automatically.
                    // If the response is ok or if we get a result, show success.
                    const result = await response.json();
                    
                    if (result.result === 'success') {
                        showSuccess();
                        localStorage.removeItem(storageKey);
                    } else {
                        showError('Server Error: ' + (result.error || 'Unknown error occurred.'));
                    }
                } catch (fetchError) {
                    // Special case: GAS Web Apps return a redirect for POST which fetch follows.
                    // Sometimes CORS might still trigger a fail in the browser even if the mail sent.
                    console.warn('Fetch encountered an issue, checking if it might be a CORS redirect issue:', fetchError);
                    
                    // If we reach here, it might be a real failure or a CORS block on the redirect.
                    // For the best user experience, we can suggest checking the email first or provide a retry.
                    showError('Connection Error: The mail server did not respond correctly. Please check if the email was received or try again.');
                }

            } catch (error) {
                console.error('GAS Submission Error:', error);
                showError('Could not connect to the mail server. Please check your connection.');
            }
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function showSuccess() {
            document.getElementById('status-loading').classList.add('hidden');
            document.getElementById('status-success').classList.remove('hidden');
        }

        function showError(msg) {
            document.getElementById('status-loading').classList.add('hidden');
            document.getElementById('status-error').classList.remove('hidden');
            document.getElementById('error-message').innerText = msg;
        }

        // Start process on load
        window.onload = generateAndSend;
    </script>
</body>
</html>
