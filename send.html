<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submitting to Google Docs - Penrithekc</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: oklch(0.98 0.01 250); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .send-container { max-width: 500px; width: 90%; background: white; padding: 3rem; border-radius: 16px; box-shadow: 0 10px 40px oklch(0 0 0 / 0.1); text-align: center; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid oklch(0.9 0.02 250); border-top: 5px solid oklch(0.6 0.2 250); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: oklch(0.4 0.05 250); margin-bottom: 1rem; }
        p { color: oklch(0.5 0.02 250); line-height: 1.6; }
        .btn-back { margin-top: 2rem; display: inline-block; padding: 0.8rem 2rem; background: oklch(0.6 0.2 250); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; transition: all 0.2s; }
        .btn-back:hover { transform: translateY(-2px); opacity: 0.9; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="send-container">
        <div id="status-loading">
            <div class="loading-spinner"></div>
            <h2>Submitting to Teacher...</h2>
            <p>We are creating a Google Doc for your essay.</p>
        </div>

        <div id="status-success" class="hidden">
            <div class="status-icon" style="font-size: 4rem; margin-bottom: 1.5rem;">✅</div>
            <h2>Successfully Submitted!</h2>
            <p>Your essay has been converted to a Google Doc and sent to <strong>penrithekc@gmail.com</strong>.</p>
            <a href="index.html" class="btn-back">Back to Writing</a>
        </div>

        <div id="status-error" class="hidden">
            <div class="status-icon" style="font-size: 4rem; margin-bottom: 1.5rem;">❌</div>
            <h2>Submission Failed</h2>
            <p id="error-message">Something went wrong while creating the document.</p>
            <a href="index.html" class="btn-back">Try Again</a>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxDGUmSRLynQJBepZOL7XwuE2RUKbveg2jI9_EXgBzSJXBjVOExY_475blS4XNWt1A/exec';

        async function submitToGDocs() {
            const storageKey = 'penrithekc_writing_data';
            const savedData = localStorage.getItem(storageKey);

            if (!savedData) {
                showError('No essay data found.');
                return;
            }

            try {
                const data = JSON.parse(savedData);
                
                // Form submission for reliable delivery without CORS preflight issues
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = GAS_URL;
                form.style.display = 'none';

                const fields = {
                    firstName: data.firstName,
                    lastName: data.lastName,
                    testNumber: data.testNumber,
                    content: data.content,
                    type: 'gdoc' // Tell GAS we want a GDoc
                };

                for (const key in fields) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = fields[key];
                    form.appendChild(input);
                }

                document.body.appendChild(form);
                form.submit();

                // Show success after a delay (since form submit redirects)
                setTimeout(() => {
                    document.getElementById('status-loading').classList.add('hidden');
                    document.getElementById('status-success').classList.remove('hidden');
                    localStorage.removeItem(storageKey);
                }, 2000);

            } catch (error) {
                showError(error.message);
            }
        }

        function showError(msg) {
            document.getElementById('status-loading').classList.add('hidden');
            document.getElementById('status-error').classList.remove('hidden');
            document.getElementById('error-message').innerText = msg;
        }

        window.onload = submitToGDocs;
    </script>
</body>
</html>
